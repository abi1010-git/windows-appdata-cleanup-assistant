name: Build Windows App

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  release:
    types: ["published"]

permissions:
  contents: write

jobs:
  build:
    name: Build Storage Detective for Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

      - name: Build executable
        run: pyinstaller --clean --noconfirm StorageDetective.spec

      - name: Package executable folder
        shell: pwsh
        run: Compress-Archive -Path "dist\Storage Detective\*" -DestinationPath "Storage-Detective-Windows.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Storage-Detective-Windows
          path: Storage-Detective-Windows.zip

      - name: Publish latest Windows release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag -f latest
          git push origin latest --force

          $notes = "Download ``Storage-Detective-Windows.zip``, extract it, and double-click ``Storage Detective.exe``.`n`nThis app is not code-signed yet, so Windows SmartScreen may show an unknown-publisher warning."

          gh release view latest *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload latest Storage-Detective-Windows.zip --clobber
            gh release edit latest --title "Latest Windows Build" --notes "$notes" --latest
          } else {
            gh release create latest Storage-Detective-Windows.zip --title "Latest Windows Build" --notes "$notes" --latest
          }

      - name: Attach ZIP to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Storage-Detective-Windows.zip
